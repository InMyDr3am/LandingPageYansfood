<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Lengkap - YansFood</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-amber-50/30 text-slate-800 antialiased">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-amber-100">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div>
                    <a href="index.html" class="text-2xl font-extrabold text-amber-600 tracking-tight">Yans<span class="text-amber-900">food</span></a>
                </div>
                <div class="hidden md:flex space-x-8 font-semibold text-sm text-slate-600">
                    <a href="index.html" class="hover:text-amber-600 transition-colors">Beranda</a>
                    <a href="index.html#unggulan" class="hover:text-amber-600 transition-colors">Keunggulan</a>
                    <a href="index.html#menu" class="hover:text-amber-600 transition-colors">Menu Populer</a>
                    <a href="menu.html" class="text-amber-600 border-b-2 border-amber-500 pb-1 font-bold">Menu Lengkap</a>
                    <a href="index.html#testimoni" class="hover:text-amber-600 transition-colors">Testimoni</a>
                </div>
                <div>
                    <a href="https://wa.me/6281234567890" target="_blank" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-full font-bold text-sm">Pesan Sekarang</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-16 min-h-screen">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 space-y-12">
            <div class="text-center max-w-2xl mx-auto space-y-3">
                <span class="text-amber-600 font-bold uppercase text-xs tracking-wider">Daftar Hidangan</span>
                <h1 class="text-4xl font-extrabold text-slate-900">Menu Lengkap YansFood</h1>
                <p class="text-slate-500">Jelajahi semua varian menu lezat kami yang dimasak fresh setiap saat.</p>
            </div>

            <div class="flex justify-center space-x-6 sm:space-x-10 border-b border-slate-200 max-w-2xl mx-auto pt-4">
    <button onclick="filterKategori('semua', this)" class="btn-filter border-b-2 border-amber-500 pb-3 text-amber-600 font-bold text-sm sm:text-base cursor-pointer transition-all duration-200">
        ✨ Semua
    </button>
    <button onclick="filterKategori('makanan_berat', this)" class="btn-filter border-b-2 border-transparent pb-3 text-slate-500 hover:text-slate-800 font-medium text-sm sm:text-base cursor-pointer transition-all duration-200">
        🍛 Makanan Berat
    </button>
    <button onclick="filterKategori('makanan_ringan', this)" class="btn-filter border-b-2 border-transparent pb-3 text-slate-500 hover:text-slate-800 font-medium text-sm sm:text-base cursor-pointer transition-all duration-200">
        🥟 Makanan Ringan
    </button>
    <button onclick="filterKategori('minuman', this)" class="btn-filter border-b-2 border-transparent pb-3 text-slate-500 hover:text-slate-800 font-medium text-sm sm:text-base cursor-pointer transition-all duration-200">
        🍹 Minuman
    </button>
</div>

            <div id="grid-menu-utama" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </section>

    <footer class="bg-slate-950 text-slate-400 py-12 text-center">
        <p class="text-sm">&copy; 2026 Yansfood. All rights reserved.</p>
    </footer>

    <script src="menu-data.js"></script>
    <script>
        // Menjalankan fungsi render awal untuk memunculkan semua menu saat halaman dibuka
        document.addEventListener("DOMContentLoaded", () => {
            renderAllMenu('grid-menu-utama', 'semua');
        });

        // Fungsi kontrol untuk tombol aktif dan memicu penyaringan data
        function filterKategori(kategori, tombolAktif) {
    renderAllMenu('grid-menu-utama', kategori);

    const seluruhTombol = document.querySelectorAll('.btn-filter');
    seluruhTombol.forEach(btn => {
        // Reset ke posisi pasif (tanpa garis bawah)
        btn.classList.remove('border-amber-500', 'text-amber-600', 'font-bold');
        btn.classList.add('border-transparent', 'text-slate-500', 'font-medium');
    });

    // Set ke posisi aktif
    tombolAktif.classList.remove('border-transparent', 'text-slate-500', 'font-medium');
    tombolAktif.classList.add('border-amber-500', 'text-amber-600', 'font-bold');
}
    </script>
</body>
</html>
